server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (on every response, including proxied API).
  # CSP: Angular prod builds emit external scripts only; PrimeNG needs inline
  # styles; connect-src 'self' works because the API is same-origin via /api/.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

  # SPA fallback. index.html must never be cached: it is the pointer to the
  # hashed JS/CSS chunks, so a stale copy keeps loading a stale app.
  # NOTE: cache control uses `expires` (not add_header) on purpose — a local
  # add_header would stop the server-level security headers from inheriting.
  location / {
    try_files $uri $uri/ /index.html;
    expires -1;
  }

  # Proxy API to the Django backend (compose service name: web)
  location /api/ {
    proxy_pass http://web:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Cache static assets (hashed filenames, safe to cache long).
  location ~* \.(js|css|woff2?|png|svg|ico)$ {
    expires 30d;
  }
}
